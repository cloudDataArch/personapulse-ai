services:
  - type: web
    name: personapulse-api
    runtime: python
    plan: free
    rootDir: APIS/personapulse-api
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: MERCADO_LIVRE_ACCESS_TOKEN
        sync: false
